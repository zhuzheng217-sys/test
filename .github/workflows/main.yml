name: WeCom Daily Weather Push

on:
  schedule:
    # 06:00 China (UTC+8) -> 22:00 UTC (previous day)
    - cron: '0 22 * * *'
    # 20:00 China -> 12:00 UTC
    - cron: '0 12 * * *'
  workflow_dispatch: {}

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run weather push
        env:
          WECOM_CORP_ID: ${{ secrets.WECOM_CORP_ID }}
          WECOM_CORP_SECRET: ${{ secrets.WECOM_CORP_SECRET }}
          WECOM_AGENT_ID: ${{ secrets.WECOM_AGENT_ID }}
          WECOM_TO_USER: ${{ secrets.WECOM_TO_USER }}
          CITY: ${{ secrets.CITY }}
          PREVIEW_DAYS: ${{ secrets.PREVIEW_DAYS }}
          FORECAST_DAYS: ${{ secrets.FORECAST_DAYS }}
          SEVERE_RAIN_MM: ${{ secrets.SEVERE_RAIN_MM }}
          SEVERE_WIND_MS: ${{ secrets.SEVERE_WIND_MS }}
          MODE: ${{ secrets.MODE }}
        run: python weather_wecom.py
